<!DOCTYPE html>
<html lang="th">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Control Panel</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/uicons-solid-rounded/css/uicons-solid-rounded.css'>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  
  <style>
    body { font-family: 'Noto Sans Thai', sans-serif; background-color: #f8fafc; }
    .glass-card { background: white; border-radius: 1.5rem; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); }
    
    input[type="number"]::-webkit-inner-spin-button, input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    
    .scanner-wrapper { position: relative; width: 100%; height: 320px; background: black; border-radius: 1.25rem; overflow: hidden; border: 4px solid #fff; }
    #reader { width: 100%; height: 100%; }
    #reader video { object-fit: cover !important; }
    
    .scan-overlay { position: absolute; inset: 0; z-index: 10; display: flex; align-items: center; justify-content: center; pointer-events: none; }
    .scan-box { width: 220px; height: 220px; position: relative; box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.6); border: 2px solid rgba(255,255,255,0.2); border-radius: 1rem; }
    .corner { position: absolute; width: 25px; height: 25px; border: 4px solid #f57c00; border-radius: 4px; }
    .tl { top: -2px; left: -2px; border-right: 0; border-bottom: 0; }
    .tr { top: -2px; right: -2px; border-left: 0; border-bottom: 0; }
    .bl { bottom: -2px; left: -2px; border-right: 0; border-top: 0; }
    .br { bottom: -2px; right: -2px; border-left: 0; border-top: 0; }
    .line { position: absolute; width: 100%; height: 2px; background: #f57c00; top: 50%; box-shadow: 0 0 10px #f57c00; animation: scan 2s infinite; }
    @keyframes scan { 0%, 100% { top: 10%; } 50% { top: 90%; } }
  </style>
</head>
<body class="p-4 md:p-8">

  <div id="auth-view" class="max-w-md mx-auto mt-10 md:mt-20">
      <div class="glass-card p-6 md:p-8 text-center border-t-8 border-orange-500">
          <div class="w-20 h-20 bg-orange-50 text-orange-500 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner">
              <i class="fi fi-sr-lock text-3xl mt-1"></i>
          </div>
          <h2 class="text-2xl font-black text-gray-800 mb-2">STAFF LOGIN</h2>
          <p class="text-gray-400 text-sm mb-2">กรุณากรอกรหัส PIN เพื่อเข้าใช้งาน</p>
          
          <div class="flex items-center justify-center gap-1 md:gap-2 mt-6 mb-8">
              <select id="pinPrefix" class="w-14 h-14 md:w-16 md:h-14 text-center text-xl font-bold border-2 border-gray-300 rounded-xl focus:border-[#f57c00] outline-none bg-gray-50 text-[#f57c00]">
                  <option value="A">A</option>
                  <option value="B">B</option>
              </select>
              <span class="text-gray-400 font-bold mx-0.5">-</span>
              <input type="text" maxlength="1" inputmode="numeric" class="pin-box w-10 h-14 md:w-11 text-center text-xl font-bold border-2 border-gray-300 rounded-xl focus:border-[#f57c00] outline-none transition-colors">
              <input type="text" maxlength="1" inputmode="numeric" class="pin-box w-10 h-14 md:w-11 text-center text-xl font-bold border-2 border-gray-300 rounded-xl focus:border-[#f57c00] outline-none transition-colors">
              <input type="text" maxlength="1" inputmode="numeric" class="pin-box w-10 h-14 md:w-11 text-center text-xl font-bold border-2 border-gray-300 rounded-xl focus:border-[#f57c00] outline-none transition-colors">
              <input type="text" maxlength="1" inputmode="numeric" class="pin-box w-10 h-14 md:w-11 text-center text-xl font-bold border-2 border-gray-300 rounded-xl focus:border-[#f57c00] outline-none transition-colors">
              <input type="text" maxlength="1" inputmode="numeric" class="pin-box w-10 h-14 md:w-11 text-center text-xl font-bold border-2 border-gray-300 rounded-xl focus:border-[#f57c00] outline-none transition-colors">
          </div>
          
          <button onclick="handleAuth()" id="loginBtn" class="w-full bg-orange-500 hover:bg-orange-600 text-white font-black py-4 rounded-2xl shadow-lg active:scale-95 transition-all text-lg">
              ยืนยันรหัสผ่าน
          </button>
          
          <div class="mt-6 border-t pt-4">
              <button onclick="google.script.run.withSuccessHandler(url=>window.top.location.href=url+'?page=index').getAppUrl()" class="text-sm text-gray-400 hover:text-orange-500 flex items-center justify-center gap-2 mx-auto transition-colors">
                  <i class="fi fi-sr-arrow-left"></i> กลับหน้าลงทะเบียน
              </button>
          </div>
      </div>
  </div>

  <div id="main-view" class="max-w-md mx-auto hidden animate-[fadeIn_0.5s_ease-out]">
      <div class="flex justify-between items-center mb-6">
          <div>
              <h1 class="text-2xl font-extrabold text-gray-800">CRA Staff</h1>
              <div class="flex items-center gap-2 text-green-600 font-bold text-xs uppercase">
                  <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span> Authorized (Scanner)
              </div>
          </div>
          <button onclick="logout()" class="w-12 h-12 bg-white rounded-full flex items-center justify-center text-gray-400 hover:text-red-500 shadow-sm border border-gray-100 transition-colors">
              <i class="fi fi-sr-sign-out-alt mt-1"></i>
          </button>
      </div>

      <div class="glass-card p-4 mb-6 flex items-center justify-between bg-orange-50 border border-orange-100">
          <span class="text-orange-700 font-bold flex items-center gap-2"><i class="fi fi-sr-calendar-day"></i> รอบรับสิทธิ์:</span>
          <select id="daySelect" onchange="updateStats()" class="bg-white border-2 border-orange-200 text-orange-600 font-black px-4 py-2 rounded-xl outline-none shadow-sm cursor-pointer">
              <option value="D1">DAY 1 (25 ก.พ.)</option>
              <option value="D2">DAY 2 (26 ก.พ.)</option>
          </select>
      </div>

      <div class="glass-card p-6 mb-6">
          <h3 class="font-bold text-gray-700 mb-4 flex items-center gap-2"><i class="fi fi-sr-keyboard text-orange-500"></i> คีย์รหัสด้วยมือ</h3>
          <div class="flex items-center gap-3 mb-4">
              <div class="bg-gray-100 px-4 py-3 rounded-xl font-bold text-gray-400 text-lg">Dek</div>
              <input type="number" id="manualInput" class="w-full p-3 bg-orange-50 border-2 border-orange-100 rounded-xl text-center text-3xl font-black text-orange-600 outline-none" placeholder="001">
          </div>
          <button onclick="submitManual()" class="w-full bg-[#1e293b] hover:bg-black text-white font-bold py-4 rounded-2xl active:scale-95 transition-all shadow-md text-lg">ยืนยันรหัส</button>
      </div>

      <div class="glass-card p-6 mb-6">
          <h3 class="font-bold text-gray-700 mb-4 flex items-center gap-2"><i class="fi fi-sr-camera text-orange-500"></i> สแกนคูปอง</h3>
          <div class="scanner-wrapper shadow-lg">
              <div id="reader"></div>
              <div class="scan-overlay">
                  <div class="scan-box">
                      <div class="corner tl"></div><div class="corner tr"></div><div class="corner bl"></div><div class="corner br"></div>
                      <div class="line"></div>
                  </div>
              </div>
          </div>
      </div>

      <div class="glass-card p-6 mb-20">
          <div class="flex justify-between items-end mb-6 pb-4 border-b border-gray-100">
              <span class="text-gray-400 font-bold text-sm">ยอดสแกนสำเร็จวันนี้</span>
              <span class="text-4xl font-black text-[#8bc34a]" id="statCount">0</span>
          </div>
          <div id="historyList" class="space-y-2">
               <p class="text-center text-gray-300 text-sm py-4 border-2 border-dashed rounded-xl">ยังไม่มีคิวรอบนี้</p>
          </div>
      </div>
  </div>

  <script>
    let html5QrCode;

    // การเลื่อนช่อง PIN อัตโนมัติ
    document.addEventListener("DOMContentLoaded", function() {
        const boxes = document.querySelectorAll('.pin-box');
        boxes.forEach((box, i) => {
            box.addEventListener('input', function() {
                this.value = this.value.replace(/[^0-9]/g, ''); 
                if (this.value !== '' && i < boxes.length - 1) boxes[i + 1].focus(); 
            });
            box.addEventListener('keydown', function(e) {
                if (e.key === 'Backspace' && this.value === '' && i > 0) boxes[i - 1].focus(); 
            });
        });

        // จำ Session
        if (sessionStorage.getItem('adminAuth') === 'true') {
            document.getElementById('auth-view').classList.add('hidden');
            document.getElementById('main-view').classList.remove('hidden');
            startScanner();
            updateStats();
        }
    });

    // 🔒 ฟังก์ชันตรวจสอบ PIN (มีดักจับ Error ป้องกันปุ่มค้างแล้ว!)
    function handleAuth() {
        const prefix = document.getElementById('pinPrefix').value;
        const pinBody = Array.from(document.querySelectorAll('.pin-box')).map(b => b.value).join('');
        const btn = document.getElementById('loginBtn');

        if (pinBody.length !== 5) {
            Swal.fire({ icon: 'warning', title: 'กรอกรหัสไม่ครบ', text: 'กรุณากรอกรหัส PIN ให้ครบ 5 หลัก', confirmButtonColor: '#f57c00' });
            return;
        }

        const fullPin = prefix + pinBody;
        
        // หมุนปุ่ม
        btn.innerHTML = `<i class="fi fi-sr-spinner animate-spin mr-2"></i> กำลังตรวจสอบ...`;
        btn.disabled = true;

        google.script.run
            .withSuccessHandler(function(res) {
                if (res.status === 'success') {
                    sessionStorage.setItem('adminAuth', 'true');
                    
                    if (res.targetPage === 'data') {
                        // ถ้าเป็น A
                        Swal.fire({ title: 'เข้าสู่ระบบสำเร็จ', text: 'กำลังพาท่านไปหน้า Dashboard...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); }});
                        google.script.run.withSuccessHandler(url => window.top.location.href = url + "?page=data").getAppUrl();
                    } else {
                        // ถ้าเป็น B
                        document.getElementById('auth-view').classList.add('hidden');
                        document.getElementById('main-view').classList.remove('hidden');
                        startScanner();
                        updateStats();
                    }
                } else {
                    // รหัสผิด (ปลดล็อกปุ่ม)
                    Swal.fire({ icon: 'error', title: 'รหัสผิด!', text: res.message || 'รหัส PIN ไม่ถูกต้อง', confirmButtonColor: '#f57c00' });
                    btn.innerHTML = "ยืนยันรหัสผ่าน";
                    btn.disabled = false;
                    document.querySelectorAll('.pin-box').forEach(b => b.value = '');
                    document.querySelector('.pin-box').focus();
                }
            })
            // 🚨 ป้องกันปุ่มค้าง ถ้าเกิดลืม Deploy หรือ Server มีปัญหา
            .withFailureHandler(function(err) {
                Swal.fire({ 
                    icon: 'error', 
                    title: 'เชื่อมต่อขัดข้อง', 
                    html: 'ไม่สามารถติดต่อหลังบ้านได้<br><b>อย่าลืมกด Deploy > New deployment ก่อนใช้งานจริงนะครับ!</b>', 
                    confirmButtonColor: '#ef4444' 
                });
                btn.innerHTML = "ยืนยันรหัสผ่าน";
                btn.disabled = false;
            })
            .verifyAdminPin(fullPin); // เรียกไปที่ Code.gs
    }

    // 📸 ฟังก์ชันกล้อง
    function startScanner() {
        if(html5QrCode) { try { html5QrCode.stop().then(() => html5QrCode.clear()); } catch(e) {} }
        html5QrCode = new Html5Qrcode("reader");
        
        html5QrCode.start(
            { facingMode: "environment" }, 
            { fps: 10, qrbox: { width: 250, height: 250 } }, 
            (txt) => {
                html5QrCode.pause();
                if (navigator.vibrate) navigator.vibrate(200);
                processAction(txt);
            }, 
            () => {}
        ).catch(err => {
            document.getElementById('reader').innerHTML = `<div class="flex flex-col items-center justify-center h-full text-red-500 font-bold p-6 text-center bg-gray-900 rounded-xl"><i class="fi fi-sr-camera-slash text-4xl mb-3"></i>เปิดกล้องไม่ได้</div>`;
        });
    }

    function submitManual() {
        const val = document.getElementById('manualInput').value;
        const day = document.getElementById('daySelect').value;
        if (!val) return;
        const fullCode = "Dek" + ("000" + val).slice(-3) + day;
        processAction(fullCode);
    }

    function processAction(code) {
        Swal.fire({ title: 'กำลังตรวจสอบ...', html: 'รหัส: <b class="text-[#f57c00] font-mono text-xl">' + code + '</b>', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });
        
        const currentSuffix = document.getElementById('daySelect').value;

        google.script.run
            .withSuccessHandler(function(res) {
                if (res.status === 'success') {
                    Swal.fire({ icon: 'success', title: 'สำเร็จ!', text: res.message, timer: 1500, showConfirmButton: false });
                    updateStats();
                } else {
                    Swal.fire({ icon: 'error', title: 'ล้มเหลว', text: res.message, confirmButtonColor: '#ef4444' });
                }
                if(html5QrCode) try{ html5QrCode.resume(); }catch(e){}
                document.getElementById('manualInput').value = '';
                document.getElementById('manualInput').focus();
            })
            .withFailureHandler(function(err) {
                Swal.fire({ icon: 'error', title: 'ขัดข้อง', text: 'เชื่อมต่อเซิร์ฟเวอร์ไม่ได้', confirmButtonColor: '#ef4444' });
                if(html5QrCode) try{ html5QrCode.resume(); }catch(e){}
            })
            .processCouponScan(code, currentSuffix);
    }

    function updateStats() {
        const day = document.getElementById('daySelect').value;
        google.script.run.withSuccessHandler(function(stats) {
            document.getElementById('statCount').innerText = stats.total || 0;
            const list = document.getElementById('historyList');
            if(stats.recent && stats.recent.length > 0) {
                list.innerHTML = stats.recent.map(item => `
                    <div class="flex justify-between items-center bg-white p-3 rounded-xl border border-gray-100 shadow-sm">
                        <div class="flex items-center gap-3">
                            <div class="w-2 h-2 rounded-full bg-[#8bc34a]"></div>
                            <span class="font-mono font-bold text-gray-700">${item.code}</span>
                        </div>
                        <span class="text-[10px] text-gray-400 font-bold">${item.time}</span>
                    </div>`).join('');
            } else {
                list.innerHTML = `<p class="text-center text-gray-300 text-sm py-6 border-2 border-dashed rounded-xl">ยังไม่มีข้อมูลของรอบนี้</p>`;
            }
        }).getScanStats(day);
    }

    function logout() {
        sessionStorage.removeItem('adminAuth');
        location.reload();
    }
  </script>
</body>
</html>
