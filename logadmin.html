<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>STAFF SCANNER</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/uicons-solid-rounded/css/uicons-solid-rounded.css'>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
  
  <style>
    body { font-family: 'Noto Sans Thai', sans-serif; background: #f1f5f9; -webkit-tap-highlight-color: transparent;}
    .glass-card { background: white; border-radius: 1.5rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
    .pin-box { text-align: center; font-size: 1.5rem; font-weight: bold; border: 2px solid #cbd5e1; border-radius: 0.75rem; transition: 0.2s; outline: none; }
    .pin-box:focus { border-color: #f57c00; }
    .toggle-checkbox:checked { right: 0; border-color: #f43f5e; }
    .toggle-checkbox:checked + .toggle-label { background-color: #f43f5e; }
    .scanner-wrapper { position: relative; width: 100%; height: 300px; background: black; border-radius: 1.5rem; overflow: hidden; }
    #reader { width: 100%; height: 100%; }
    #reader video { object-fit: cover; width: 100%; height: 100%; }
    .scan-line { position: absolute; width: 100%; height: 2px; background: #8bc34a; top: 50%; box-shadow: 0 0 10px #8bc34a; animation: scanMove 2s infinite ease-in-out; z-index: 50; }
    @keyframes scanMove { 0% { top: 10%; } 50% { top: 90%; } 100% { top: 10%; } }
  </style>
</head>
<body class="p-4 md:p-8 pb-20">
  <div id="loginSection" class="max-w-md mx-auto animate-[fadeIn_0.5s_ease-out]">
      <div class="glass-card p-8 text-center border-t-4 border-orange-500 relative">
          <a href="index.html" class="absolute top-4 right-4 text-gray-400 text-2xl"><i class="fi fi-sr-cross-circle"></i></a>
          <div class="w-16 h-16 bg-orange-100 rounded-full flex justify-center items-center text-orange-500 mx-auto mb-4"><i class="fi fi-sr-lock text-2xl"></i></div>
          <h2 class="text-xl font-bold mb-6">Staff Only</h2>
          <div class="flex justify-center gap-2 mb-6">
              <select id="pinPrefix" class="w-16 h-14 text-center text-xl font-bold border-2 border-gray-300 rounded-xl bg-gray-50 text-orange-500 outline-none"><option value="A">A</option><option value="B">B</option></select>
              <span class="text-gray-400 font-bold mt-3">-</span>
              <input type="tel" maxlength="1" class="pin-box w-11 h-14"><input type="tel" maxlength="1" class="pin-box w-11 h-14"><input type="tel" maxlength="1" class="pin-box w-11 h-14"><input type="tel" maxlength="1" class="pin-box w-11 h-14"><input type="tel" maxlength="1" class="pin-box w-11 h-14">
          </div>
          <button id="btnLogin" onclick="verifyPin()" class="w-full bg-orange-500 text-white py-3.5 rounded-xl font-bold">เข้าสู่ระบบ</button>
      </div>
  </div>

  <div id="scannerSection" class="max-w-md mx-auto hidden animate-[fadeIn_0.5s_ease-out]">
      <div class="flex justify-between items-center mb-4">
          <div><h1 class="text-xl font-extrabold">CRA Photobooth</h1><p class="text-xs text-orange-500 font-bold">โหมดสแกน</p></div>
          <button onclick="logout()" class="w-10 h-10 bg-white rounded-full flex justify-center items-center text-red-500 shadow-sm"><i class="fi fi-sr-sign-out-alt"></i></button>
      </div>

      <div class="glass-card p-4 mb-4 text-center">
          <div class="flex justify-center items-center gap-4">
              <span class="font-bold text-gray-800" id="textD1">Day 1 (D1)</span>
              <div class="relative inline-block w-14 align-middle select-none">
                  <input type="checkbox" id="dayToggle" onchange="updateDayMode()" class="toggle-checkbox absolute block w-7 h-7 rounded-full bg-white border-4 appearance-none cursor-pointer z-10 transition-all"/>
                  <label for="dayToggle" class="toggle-label block h-7 rounded-full bg-orange-400 cursor-pointer transition-colors"></label>
              </div>
              <span class="font-bold text-gray-400" id="textD2">Day 2 (D2)</span>
          </div>
      </div>

      <div class="glass-card p-4 mb-4">
          <div class="scanner-wrapper shadow-inner relative">
              <div id="reader"></div>
              <div class="scan-line" id="scanLine" style="display:none;"></div>
              <div id="startScanBtn" class="absolute inset-0 bg-black/80 z-40 flex flex-col justify-center items-center">
                  <button onclick="startScanner()" class="bg-green-500 text-white px-6 py-3 rounded-full font-bold flex items-center gap-2"><i class="fi fi-sr-camera"></i> เปิดกล้องสแกน</button>
              </div>
          </div>
      </div>

      <div class="glass-card p-4 mb-4">
          <form onsubmit="event.preventDefault(); submitManualCode();" class="flex gap-2">
              <div class="bg-gray-100 px-3 py-3 rounded-xl font-bold text-gray-500">Dek</div>
              <input type="tel" id="manualCode" placeholder="001" class="w-full bg-orange-50 border text-center rounded-xl font-bold text-xl text-orange-500 outline-none" autocomplete="off" maxlength="3">
              <div id="suffixBox" class="bg-orange-500 text-white px-3 py-3 rounded-xl font-bold">D1</div>
              <button type="submit" class="bg-slate-800 text-white px-4 rounded-xl font-bold"><i class="fi fi-sr-paper-plane"></i></button>
          </form>
      </div>

      <div class="glass-card p-4">
          <div class="flex justify-between items-center bg-green-50 p-3 rounded-xl mb-3">
              <span class="font-bold text-green-700 text-sm">สแกนแล้ว (รอบ <span id="statDay">D1</span>)</span>
              <span class="text-2xl font-black text-green-600" id="totalScanned">-</span>
          </div>
          <div id="recentScansList" class="space-y-2 text-sm"></div>
      </div>
  </div>

  <script>
    // ==========================================
    // ใส่ URL ของ Google Apps Script ของคุณที่นี่
    // ==========================================
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbzLPHtsitN.../exec'; 

    async function apiCall(action, data = {}) {
        try {
            const res = await fetch(GAS_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify({ action: action, data: data }) });
            return await res.json();
        } catch(e) { throw new Error('Network Error'); }
    }

    let html5QrCode;
    let currentSuffix = "D1"; 

    const pinBoxes = document.querySelectorAll('.pin-box');
    pinBoxes.forEach((box, i) => {
        box.addEventListener('input', function() {
            this.value = this.value.replace(/\D/g, ''); 
            if (this.value && i < pinBoxes.length - 1) pinBoxes[i + 1].focus(); 
        });
        box.addEventListener('keydown', function(e) { if (e.key === 'Backspace' && !this.value && i > 0) pinBoxes[i - 1].focus(); });
    });

    window.onload = () => { if(sessionStorage.getItem('adminAuth') === 'true') showScannerUI(); };

    function verifyPin() {
        const fullPin = document.getElementById('pinPrefix').value + Array.from(pinBoxes).map(b => b.value).join('');
        if(fullPin.length !== 6) return Swal.fire({icon: 'warning', text: 'กรอกรหัสไม่ครบ'});

        let btn = document.getElementById('btnLogin'); btn.innerText = 'รอสักครู่...'; btn.disabled = true;
        apiCall('verifyAdminPin', { pin: fullPin }).then(res => {
            btn.innerText = 'เข้าสู่ระบบ'; btn.disabled = false;
            if(res.status === 'success') { 
                sessionStorage.setItem('adminAuth', 'true'); 
                showScannerUI(); 
            } else {
                Swal.fire({icon: 'error', text: res.message});
            }
        }).catch((err) => { 
            btn.innerText = 'เข้าสู่ระบบ'; btn.disabled = false;
            // เพิ่มบรรทัดนี้ เพื่อให้เรารู้ว่ามันพังเพราะอะไร
            Swal.fire({icon: 'error', title: 'การเชื่อมต่อขัดข้อง', text: err.message});
        });
    }

    function showScannerUI() {
        document.getElementById('loginSection').classList.add('hidden');
        document.getElementById('scannerSection').classList.remove('hidden');
        updateDayMode();
    }

    function updateDayMode() {
        currentSuffix = document.getElementById('dayToggle').checked ? "D2" : "D1";
        document.getElementById('suffixBox').innerText = currentSuffix;
        document.getElementById('suffixBox').className = currentSuffix === "D2" ? "bg-rose-500 text-white px-3 py-3 rounded-xl font-bold" : "bg-orange-500 text-white px-3 py-3 rounded-xl font-bold";
        document.getElementById('textD1').className = currentSuffix === "D1" ? "font-bold text-gray-800" : "font-bold text-gray-400";
        document.getElementById('textD2').className = currentSuffix === "D2" ? "font-bold text-gray-800" : "font-bold text-gray-400";
        document.getElementById('manualCode').value = "";
        fetchStats(); 
    }

    function startScanner() {
        document.getElementById('startScanBtn').classList.add('hidden');
        document.getElementById('scanLine').style.display = 'block';
        
        if(html5QrCode && html5QrCode.isScanning) {
            html5QrCode.stop().then(() => initCamera()).catch(()=> initCamera());
        } else { initCamera(); }
    }

    function initCamera() {
        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: { width: 200, height: 200 } },
            (decodedText) => {
                html5QrCode.pause(); 
                if(navigator.vibrate) navigator.vibrate(200);
                processCode(decodedText);
            },
            (err) => {} 
        ).catch(err => {
            document.getElementById('startScanBtn').classList.remove('hidden');
            document.getElementById('scanLine').style.display = 'none';
            Swal.fire({icon: 'error', text: 'ไม่สามารถเปิดกล้องได้ โปรดอนุญาตสิทธิ์ Browser'});
        });
    }

    function submitManualCode() {
        let val = document.getElementById('manualCode').value.trim();
        if(!val) return;
        processCode("Dek" + ("000" + val).slice(-3) + currentSuffix);
    }

    function processCode(code) {
        Swal.fire({ title: 'กำลังเช็ค...', html: `<b class="text-xl text-orange-500 font-mono">${code}</b>`, allowOutsideClick: false, didOpen: () => Swal.showLoading() });

        apiCall('processCouponScan', { code: code, suffix: currentSuffix }).then(res => {
            if(res.status === 'success') {
                Swal.fire({ icon: 'success', title: 'สำเร็จ', timer: 1500, showConfirmButton: false });
                if(res.stats) updateStatsUI(res.stats);
            } else Swal.fire({ icon: 'error', title: 'ไม่ผ่าน', text: res.message });
            
            if(html5QrCode && html5QrCode.getState() === 3) html5QrCode.resume();
            document.getElementById('manualCode').value = "";
        }).catch(() => {
            Swal.fire({ icon: 'error', title: 'ขัดข้อง' });
            if(html5QrCode && html5QrCode.getState() === 3) html5QrCode.resume();
        });
    }

    function fetchStats() {
        apiCall('getScanStats', { suffix: currentSuffix }).then(stats => updateStatsUI(stats));
    }

    function updateStatsUI(stats) {
        document.getElementById('totalScanned').innerText = stats.total || 0;
        document.getElementById('statDay').innerText = currentSuffix;
        let list = document.getElementById('recentScansList');
        if(stats.recent && stats.recent.length > 0) {
            list.innerHTML = stats.recent.map(i => `<div class="flex justify-between bg-white px-3 py-2 rounded-lg border shadow-sm"><span class="font-mono font-bold">${i.code}</span><span class="text-xs text-gray-400 mt-0.5">${i.time}</span></div>`).join('');
        } else {
            list.innerHTML = '<p class="text-center text-gray-400 py-2 border-2 border-dashed rounded-lg">ว่างเปล่า</p>';
        }
    }

    function logout() {
        sessionStorage.removeItem('adminAuth');
        window.location.reload(); 
    }
  </script>
</body>
</html>
